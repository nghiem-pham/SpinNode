server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/spinnode
    username: postgres
    password: REDACTED_DB_PASSWORD
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

  security: 
    oauth2:
      client:
        registration:
          google:
            client-id: REDACTED_GOOGLE_CLIENT_ID
            client-secret: REDACTED_GOOGLE_CLIENT_SECRET
            scope:
              - openid
              - profile
              - email

logging:
  level:
    org.hibernate.SQL: debug

app:
  frontend:
    url: "http://localhost:4173"
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32+_CHARS_MINIMUM"
    access-token-minutes: 60
    refresh-token-days: 7
    issuer: "spinnode-api"
