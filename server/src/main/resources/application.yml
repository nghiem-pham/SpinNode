server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spinnode}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

  security: 
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email

logging:
  level:
    org.hibernate.SQL: debug

groq:
  api-key: ${GROQ_API_KEY:}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-32-chars-minimum}
    access-token-minutes: 60
    refresh-token-days: 7
    issuer: "spinnode-api"
